  <meta name="theme-color" content="#0f172a" id="theme-color-meta">

<body>
  <div id="global-error-display"
    style="display:none; color:red; padding:20px; font-family:monospace; white-space:pre-wrap;"></div>
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      var display = document.getElementById('global-error-display');
      display.style.display = 'block';
      display.innerHTML += 'Global Error: ' + message + '\nAt: ' + source + ':' + lineno + ':' + colno + '\n\n';
      console.error('Global Error Trap:', message, error);
    };
  </script>
  <style>
    :root {
      --splash-bg: #F8FAFC;
    }

    .theme-valentine {
      --splash-bg: #1a0508;
    }

    body {
      margin: 0;
      background-color: var(--splash-bg);
      font-family: 'Outfit', sans-serif;
    }
  </style>
  <script>
    // Immediate Theme Background Application
    try {
      const stored = localStorage.getItem('theme-storage');
      if (stored) {
        const data = JSON.parse(stored);
        const theme = data.state?.theme || data.theme;
        if (theme && theme !== 'system') {
          document.documentElement.classList.add('theme-' + theme);

          if (theme === 'valentine') {
            document.body.style.backgroundColor = '#1a0508';
          }
        }
      }
    } catch (e) { console.error('Theme load error:', e); }
  </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
